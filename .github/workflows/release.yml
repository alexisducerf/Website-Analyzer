name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          check-latest: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev
          # Create a symlink to satisfy the build system looking for 4.0
          sudo ln -s /usr/lib/x86_64-linux-gnu/pkgconfig/webkit2gtk-4.1.pc /usr/lib/x86_64-linux-gnu/pkgconfig/webkit2gtk-4.0.pc

      - name: Build Application
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            wails build -platform windows/amd64
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            wails build -platform darwin/universal
          else
            wails build -platform linux/amd64 -tags webkit2gtk_4_1
          fi

      - name: Compress Archives
        shell: bash
        run: |
          mkdir -p releases
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cd build/bin && 7z a -tzip "../../releases/web-seo-windows-amd64.zip" web-seo.exe
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            cd build/bin && zip -r "../../releases/web-seo-macos-universal.zip" web-seo.app
          else
            cd build/bin && zip -r "../../releases/web-seo-linux-amd64.zip" web-seo
          fi

      - name: Upload Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: releases/*
